<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="url(#bg)"/>
  
  <!-- Document/Image frame -->
  <rect x="60" y="50" width="136" height="156" rx="12" fill="white" opacity="0.95"/>
  
  <!-- Image area -->
  <rect x="76" y="66" width="104" height="60" rx="6" fill="#e0e5ec"/>
  
  <!-- Mountains in image -->
  <polygon points="76,126 110,86 144,126" fill="#a0aec0"/>
  <polygon points="110,126 150,96 180,126" fill="#cbd5e0"/>
  
  <!-- Sun in image -->
  <circle cx="150" cy="86" r="12" fill="#fbbf24"/>
  
  <!-- OCR text lines -->
  <rect x="76" y="142" width="80" height="8" rx="4" fill="url(#text)"/>
  <rect x="76" y="158" width="60" height="8" rx="4" fill="url(#text)"/>
  <rect x="76" y="174" width="70" height="8" rx="4" fill="url(#text)"/>
  
  <!-- Scan line effect -->
  <line x1="68" y1="130" x2="188" y2="130" stroke="#667eea" stroke-width="3" stroke-dasharray="8,4" opacity="0.8"/>
  
  <!-- OCR magnifying glass -->
  <circle cx="178" cy="178" r="28" fill="white" stroke="url(#bg)" stroke-width="4"/>
  <text x="166" y="186" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="url(#text)">OCR</text>
  <line x1="196" y1="196" x2="210" y2="210" stroke="url(#bg)" stroke-width="6" stroke-linecap="round"/>
</svg>
